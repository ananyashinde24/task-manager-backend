version: "3.9"

services:

  postgres:

    image: postgres:17

    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: taskmanagerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  task-manager:

    build: .

    container_name: task-manager-api

    restart: unless-stopped

    depends_on:
      - postgres

    ports:
      - "8001:8000"

    env_file:
      - .env

volumes:

  postgres_data: